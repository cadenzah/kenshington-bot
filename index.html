<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>켄싱턴 예약 모니터</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #fff;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --muted: #757575;
      --primary: #1a73e8;
      --success: #188038;
      --danger: #c5221f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding: 32px 24px; max-width: 720px; margin: 0 auto; }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 14px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .span2 { grid-column: 1 / -1; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
    select, input[type="date"], input[type="number"], input[type="text"] {
      border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px;
      font-size: 14px; width: 100%; outline: none; background: #fff;
    }
    select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px #1a73e820; }
    .actions { display: flex; gap: 10px; margin-top: 16px; align-items: center; }
    button { padding: 9px 22px; border-radius: 6px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #1558d6; }
    .btn-stop { background: #fff; color: var(--danger); border: 1px solid var(--danger); }
    .btn-stop:hover { background: #fce8e6; }
    .btn-sm { padding: 7px 14px; font-size: 13px; }

    /* status bar */
    .status-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .dot.running { background: var(--success); animation: blink 1.4s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* log */
    #log { font-size: 14px; max-height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .log-entry { padding: 10px 14px; border-radius: 8px; border: 1px solid transparent; }
    .log-entry.none    { background: #fafafa; border-color: var(--border); }
    .log-entry.available { background: #e6f4ea; border-color: #a8d5b5; }
    .log-entry.error,
    .log-entry.expired { background: #fce8e6; border-color: #f5c6c3; }
    .log-meta { display: flex; align-items: center; gap: 10px; }
    .log-time  { font-family: "SF Mono", "Consolas", monospace; font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .log-count { font-size: 12px; color: #bbb; flex-shrink: 0; }
    .log-badge { font-size: 12px; font-weight: 600; padding: 2px 9px; border-radius: 20px; flex-shrink: 0; }
    .badge-none      { background: #e8e8e8; color: var(--muted); }
    .badge-available { background: var(--success); color: #fff; }
    .badge-error,
    .badge-expired   { background: var(--danger); color: #fff; }
    .log-detail { font-size: 13px; color: var(--danger); }
    .log-rooms { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; padding-left: 2px; }
    .log-room  { font-size: 13px; color: #1a5c2a; display: flex; gap: 6px; }
    .log-room::before { content: "·"; color: #6aaa7e; }
    .empty { color: var(--muted); font-size: 13px; padding: 4px 0; }

    /* session details */
    details { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 14px; }
    summary { padding: 14px 20px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--muted); list-style: none; user-select: none; }
    summary::after { content: " ▾"; }
    details[open] summary::after { content: " ▴"; }
    .details-body { padding: 0 20px 18px; }
    #sessionMsg { font-size: 13px; color: var(--success); display: none; }
  </style>
</head>
<body>
  <h1>켄싱턴 리조트 예약 모니터</h1>

  <div class="card">
    <div class="grid">
      <div class="field span2">
        <label>지점</label>
        <select id="bran_cd"></select>
      </div>
      <div class="field">
        <label>체크인</label>
        <input type="date" id="checkin">
      </div>
      <div class="field">
        <label>체크아웃</label>
        <input type="date" id="checkout">
      </div>
      <div class="field">
        <label>성인</label>
        <input type="number" id="adult_cnt" value="2" min="1" max="10">
      </div>
      <div class="field">
        <label>아동</label>
        <input type="number" id="child_cnt" value="0" min="0" max="10">
      </div>
      <div class="field">
        <label>체크 간격 (분)</label>
        <input type="number" id="interval" value="5" min="1" max="60">
      </div>
    </div>
    <div class="actions">
      <button class="btn-primary" id="startBtn" onclick="startMonitor()">모니터링 시작</button>
      <button class="btn-stop" id="stopBtn" style="display:none" onclick="stopMonitor()">중지</button>
    </div>
  </div>

  <div class="card">
    <div class="status-bar">
      <span class="dot" id="dot"></span>
      <span id="statusText">대기 중</span>
    </div>
    <div id="log"><p class="empty">모니터링을 시작하면 여기에 결과가 표시됩니다.</p></div>
  </div>

  <details>
    <summary>세션 설정</summary>
    <div class="details-body">
      <div class="grid" style="margin-top: 4px;">
        <div class="field">
          <label>회원번호</label>
          <input type="text" id="memb_no" placeholder="015-24980-05">
        </div>
        <div class="field">
          <label>khrf 쿠키 (2시간마다 갱신)</label>
          <input type="text" id="khrf" placeholder="DevTools > Application > Cookies에서 복사">
        </div>
      </div>
      <div class="actions" style="margin-top: 12px;">
        <button class="btn-primary btn-sm" onclick="saveSession()">저장</button>
        <span id="sessionMsg">저장됨 ✓</span>
      </div>
    </div>
  </details>

  <script>
    let evtSource = null;

    // ── localStorage 저장/복원 ──────────────────────────────
    const STORAGE_KEY = "kenshington_form";
    const FORM_FIELDS = ["checkin", "checkout", "adult_cnt", "child_cnt", "interval"];

    function saveForm() {
      const saved = { bran_cd: document.getElementById("bran_cd").value };
      FORM_FIELDS.forEach((id) => { saved[id] = document.getElementById(id).value; });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    }

    function loadForm(savedBranCd) {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const saved = JSON.parse(raw);
      FORM_FIELDS.forEach((id) => {
        if (saved[id] !== undefined) document.getElementById(id).value = saved[id];
      });
      if (savedBranCd && saved.bran_cd) {
        document.getElementById("bran_cd").value = saved.bran_cd;
      }
    }

    // 모든 폼 필드 변경 시 자동 저장
    [...FORM_FIELDS, "bran_cd"].forEach((id) => {
      document.getElementById(id).addEventListener("change", saveForm);
    });

    // ── 지점 목록 로드 ──────────────────────────────────────
    fetch("/branches")
      .then((r) => r.json())
      .then((branches) => {
        const sel = document.getElementById("bran_cd");
        const addGroup = (label, items) => {
          const grp = document.createElement("optgroup");
          grp.label = label;
          items.sort((a, b) => a.sortSeq - b.sortSeq).forEach((b) => {
            const opt = document.createElement("option");
            opt.value = b.branCd;
            opt.textContent = b.branNm;
            grp.appendChild(opt);
          });
          sel.appendChild(grp);
        };
        addGroup("켄싱턴 직영", branches.filter((b) => b.resortDiv === "0"));
        addGroup("연계 리조트", branches.filter((b) => b.resortDiv === "1"));
        // 지점 옵션이 모두 추가된 후 복원
        loadForm(true);
      });

    // ── 기본 날짜 설정 후 나머지 필드 복원 ─────────────────
    const fmt = (d) => d.toISOString().slice(0, 10);
    const today = new Date();
    const tomorrow = new Date(today);
    tomorrow.setDate(today.getDate() + 1);
    document.getElementById("checkin").value = fmt(today);
    document.getElementById("checkout").value = fmt(tomorrow);
    // bran_cd 제외한 나머지 필드 먼저 복원 (지점은 옵션 로드 후 복원)
    loadForm(false);

    function startMonitor() {
      const params = new URLSearchParams({
        bran_cd:   document.getElementById("bran_cd").value,
        checkin:   document.getElementById("checkin").value,
        checkout:  document.getElementById("checkout").value,
        adult_cnt: document.getElementById("adult_cnt").value,
        child_cnt: document.getElementById("child_cnt").value,
        interval:  document.getElementById("interval").value,
      });

      document.getElementById("log").innerHTML = "";
      document.getElementById("startBtn").style.display = "none";
      document.getElementById("stopBtn").style.display = "";
      document.getElementById("dot").className = "dot running";
      document.getElementById("statusText").textContent = "모니터링 중...";

      evtSource = new EventSource(`/api/monitor?${params}`);
      evtSource.onmessage = (e) => {
        const d = JSON.parse(e.data);
        appendLog(d);
        if (d.status === "session_expired") stopMonitor();
      };
      evtSource.onerror = () => {
        appendLog({ time: now(), status: "error", message: "연결 오류 — 서버 상태를 확인하세요" });
        stopMonitor();
      };
    }

    function stopMonitor() {
      if (evtSource) { evtSource.close(); evtSource = null; }
      document.getElementById("startBtn").style.display = "";
      document.getElementById("stopBtn").style.display = "none";
      document.getElementById("dot").className = "dot";
      document.getElementById("statusText").textContent = "중지됨";
    }

    function appendLog(d) {
      const log = document.getElementById("log");

      const statusKey = d.status === "session_expired" ? "expired" : (d.status ?? "error");
      const entry = document.createElement("div");
      entry.className = `log-entry ${statusKey}`;

      // 메타 행: 시간 · 횟수 · 배지 · 부가 텍스트
      const meta = document.createElement("div");
      meta.className = "log-meta";

      const time = document.createElement("span");
      time.className = "log-time";
      time.textContent = d.time || now();

      const count = document.createElement("span");
      count.className = "log-count";
      count.textContent = `#${d.count ?? "?"}`;

      const badge = document.createElement("span");
      badge.className = `log-badge badge-${statusKey}`;

      let detail = "";
      if (d.status === "available") {
        badge.textContent = `객실 ${d.rooms.length}개 발견`;
      } else if (d.status === "none") {
        badge.textContent = "빈 방 없음";
      } else if (d.status === "session_expired") {
        badge.textContent = "세션 만료";
        detail = "khrf 쿠키를 갱신하고 저장하세요";
      } else {
        badge.textContent = "오류";
        detail = d.message ?? d.hint ?? d.status;
      }

      meta.append(time, count, badge);
      if (detail) {
        const txt = document.createElement("span");
        txt.className = "log-detail";
        txt.textContent = detail;
        meta.appendChild(txt);
      }
      entry.appendChild(meta);

      // 객실 목록
      if (d.status === "available" && d.rooms?.length) {
        const roomList = document.createElement("div");
        roomList.className = "log-rooms";
        d.rooms.forEach((r) => {
          const item = document.createElement("div");
          item.className = "log-room";
          item.textContent = r;
          roomList.appendChild(item);
        });
        entry.appendChild(roomList);
      }

      log.insertBefore(entry, log.firstChild);
    }

    async function saveSession() {
      const body = {};
      const khrf = document.getElementById("khrf").value.trim();
      const memb_no = document.getElementById("memb_no").value.trim();
      if (khrf) body.khrf = khrf;
      if (memb_no) body.memb_no = memb_no;
      await fetch("/api/session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const msg = document.getElementById("sessionMsg");
      msg.style.display = "";
      setTimeout(() => { msg.style.display = "none"; }, 2000);
    }

    const now = () => new Date().toTimeString().slice(0, 8);
  </script>
</body>
</html>
